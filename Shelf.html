<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelf Sync</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    
    <div class="app-container">
        <div class="input-container">
            <div class="header">
                <h1>Pantry Tracker</h1>
            </div>

            <div id="pantry">Pantry: Empty</div> 

            <form id="item">
                <input type="text" id="description" placeholder="Item" required>
                <input type="date" id="expiry" placeholer="Date of Expiry", required>
                <select id="type" required>
                    <option value="food">Perishable</option>
                    <option value="food">Non-Perishable</option>
                </select>

                <button type="submit">Add Item</button>

            </form> 
        </div>
        
        <div class="grocery-container">
            <h2>Pantry List</h2>
            <! sample data for the project>
            <div id="pantryList">
                <div class="pantry list perishable">
                    <span>Canned Tomatoes</span>
                    <span class="pantry-list-container">2026-04-30<button class="delete-btn">Delete</button></span>
                </div>

                <div class="pantry list nonperishable">
                    <span>Canned Tomatoes</span>
                    <span class="pantry-list-container">2026-04-30<button class="delete-btn">Delete</button></span>
                </div>

                <div class="pantry list perishable">
                    <span>Canned Tomatoes</span>
                    <span class="pantry-list-container">2026-04-30<button class="delete-btn">Delete</button></span>
                </div>

                <div class="pantry list nonperishable">
                    <span>Canned Tomatoes</span>
                    <span class="pantry-list-container">2026-04-30<button class="delete-btn">Delete</button></span>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
